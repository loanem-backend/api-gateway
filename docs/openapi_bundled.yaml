openapi: 3.0.3
info:
    title: Loanem Back-End - OpenAPI 3.0
    description: |-
        This is a sample Loanem Back-End Server based on the OpenAPI 3.0 specification.
    version: 1.0.0
components:
    securitySchemes:
        BearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT
security:
    - BearerAuth: []
tags:
    - name: auth
    - name: course
    - name: inventory
paths:
    /login:
        post:
            tags:
                - auth
            security: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                phone:
                                    type: string
                                password:
                                    type: string
            responses:
                '201':
                    description: Successfully logged in.
                    content:
                        application/json:
                            schema:
                                allOf:
                                    - type: object
                                      properties:
                                        success:
                                            type: boolean
                                        message:
                                            type: string
                                      required:
                                        - success
                                        - message
                                    - type: object
                                      properties:
                                        data:
                                            type: object
                                            properties:
                                                token:
                                                    type: string
                                            required:
                                                - token
    /courses:
        post:
            tags:
                - course
            security:
                - BearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type: string
                                year:
                                    type: integer
            responses:
                '201':
                    description: Course successfully created.
                    content:
                        application/json:
                            schema:
                                allOf:
                                    - type: object
                                      properties:
                                        success:
                                            type: boolean
                                        message:
                                            type: string
                                      required:
                                        - success
                                        - message
                                    - type: object
                                      properties:
                                        data:
                                            type: object
                                            properties:
                                                id:
                                                    type: integer
                                            required:
                                                - id
    /courses/{courseID}:
        delete:
            tags:
                - course
            security:
                - BearerAuth: []
            parameters:
                - in: path
                  name: courseID
                  schema:
                    type: integer
                  required: true
                  description: Numeric ID of the course to delete
            responses:
                '200':
                    description: Course successfully deleted.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success:
                                        type: boolean
                                    message:
                                        type: string
                                required:
                                    - success
                                    - message
    /toolkits:
        post:
            tags:
                - inventory
            security:
                - BearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                kit_name:
                                    type: string
                                total_count:
                                    type: integer
            responses:
                '201':
                    description: Toolkit successfully created.
                    content:
                        application/json:
                            schema:
                                allOf:
                                    - type: object
                                      properties:
                                        success:
                                            type: boolean
                                        message:
                                            type: string
                                      required:
                                        - success
                                        - message
                                    - type: object
                                      properties:
                                        data:
                                            type: object
                                            properties:
                                                id:
                                                    type: integer
                                            required:
                                                - id
        get:
            tags:
                - inventory
            responses:
                '200':
                    description: Toolkits successfully retrieved.
                    content:
                        application/json:
                            schema:
                                allOf:
                                    - type: object
                                      properties:
                                        success:
                                            type: boolean
                                        message:
                                            type: string
                                      required:
                                        - success
                                        - message
                                    - type: object
                                      properties:
                                        data:
                                            type: array
                                            items:
                                                type: object
                                                properties:
                                                    id:
                                                        type: integer
                                                    kit_name:
                                                        type: string
                                                    total_count:
                                                        type: integer
                                                    out_of_order_count:
                                                        type: integer
                                                    course_id:
                                                        type: integer
                                                    created_at:
                                                        type: string
                                                        format: date-time
                                                    updated_at:
                                                        type: string
                                                        format: date-time
                                                required:
                                                    - id
                                                    - kit_name
                                                    - total_count
                                                    - out_of_order_count
                                                    - course_id
                                                    - created_at
                                                    - updated_at
