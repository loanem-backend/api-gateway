openapi: 3.0.3
info:
    title: Loanem Back-End - OpenAPI 3.0
    description: |-
        This is a sample Loanem Back-End Server based on the OpenAPI 3.0 specification.
    version: 1.0.0
components:
    securitySchemes:
        BearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT
security:
    - BearerAuth: []
tags:
    - name: auth
    - name: course
    - name: inventory
    - name: participant
paths:
    /login:
        post:
            tags:
                - auth
            security: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                phone:
                                    type: string
                                password:
                                    type: string
            responses:
                '201':
                    description: Successfully logged in.
                    content:
                        application/json:
                            schema:
                                allOf:
                                    - type: object
                                      properties:
                                        success:
                                            type: boolean
                                        message:
                                            type: string
                                      required:
                                        - success
                                        - message
                                    - type: object
                                      properties:
                                        data:
                                            type: object
                                            properties:
                                                access_token:
                                                    type: string
    /login/refresh:
        post:
            tags:
                - auth
            security: []
            parameters:
                - in: cookie
                  name: refresh_token
                  schema:
                    type: string
                    format: uuid
                  required: true
                  description: Session cookie for token refreshing.
            responses:
                '201':
                    description: Successfully logged in.
                    content:
                        application/json:
                            schema:
                                allOf:
                                    - type: object
                                      properties:
                                        success:
                                            type: boolean
                                        message:
                                            type: string
                                      required:
                                        - success
                                        - message
                                    - type: object
                                      properties:
                                        data:
                                            type: object
                                            properties:
                                                access_token:
                                                    type: string
    /logout:
        post:
            tags:
                - auth
            parameters:
                - in: cookie
                  name: refresh_token
                  schema:
                    type: string
                    format: uuid
                  required: true
                  description: Session cookie for token refreshing.
            responses:
                '200':
                    description: Successfully logged out.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success:
                                        type: boolean
                                    message:
                                        type: string
                                required:
                                    - success
                                    - message
    /courses:
        post:
            tags:
                - course
            security:
                - BearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type: string
                                year:
                                    type: integer
            responses:
                '201':
                    description: Course successfully created.
                    content:
                        application/json:
                            schema:
                                allOf:
                                    - type: object
                                      properties:
                                        success:
                                            type: boolean
                                        message:
                                            type: string
                                      required:
                                        - success
                                        - message
                                    - type: object
                                      properties:
                                        data:
                                            type: object
                                            properties:
                                                id:
                                                    type: integer
                                            required:
                                                - id
    /courses/{courseID}:
        delete:
            tags:
                - course
            security:
                - BearerAuth: []
            parameters:
                - in: path
                  name: courseID
                  schema:
                    type: integer
                  required: true
                  description: Numeric ID of the course to delete
            responses:
                '200':
                    description: Course successfully deleted.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success:
                                        type: boolean
                                    message:
                                        type: string
                                required:
                                    - success
                                    - message
    /toolkits:
        post:
            tags:
                - inventory
            security:
                - BearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                kit_name:
                                    type: string
                                total_count:
                                    type: integer
            responses:
                '201':
                    description: Toolkit successfully created.
                    content:
                        application/json:
                            schema:
                                allOf:
                                    - type: object
                                      properties:
                                        success:
                                            type: boolean
                                        message:
                                            type: string
                                      required:
                                        - success
                                        - message
                                    - type: object
                                      properties:
                                        data:
                                            type: object
                                            properties:
                                                id:
                                                    type: integer
                                            required:
                                                - id
        get:
            tags:
                - inventory
            responses:
                '200':
                    description: Toolkits successfully retrieved.
                    content:
                        application/json:
                            schema:
                                allOf:
                                    - type: object
                                      properties:
                                        success:
                                            type: boolean
                                        message:
                                            type: string
                                      required:
                                        - success
                                        - message
                                    - type: object
                                      properties:
                                        data:
                                            type: array
                                            items:
                                                type: object
                                                properties:
                                                    id:
                                                        type: integer
                                                    kit_name:
                                                        type: string
                                                    total_count:
                                                        type: integer
                                                    out_of_order_count:
                                                        type: integer
                                                    course_id:
                                                        type: integer
                                                    created_at:
                                                        type: string
                                                        format: date-time
                                                    updated_at:
                                                        type: string
                                                        format: date-time
                                                required:
                                                    - id
                                                    - kit_name
                                                    - total_count
                                                    - out_of_order_count
                                                    - course_id
                                                    - created_at
                                                    - updated_at
    /instruments:
        post:
            tags:
                - inventory
            security:
                - BearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type: string
            responses:
                '201':
                    description: Instrument successfully created.
                    content:
                        application/json:
                            schema:
                                allOf:
                                    - type: object
                                      properties:
                                        success:
                                            type: boolean
                                        message:
                                            type: string
                                      required:
                                        - success
                                        - message
                                    - type: object
                                      properties:
                                        data:
                                            type: object
                                            properties:
                                                id:
                                                    type: integer
                                            required:
                                                - id
        get:
            tags:
                - inventory
            responses:
                '200':
                    description: Instruments successfully retrieved.
                    content:
                        application/json:
                            schema:
                                allOf:
                                    - type: object
                                      properties:
                                        success:
                                            type: boolean
                                        message:
                                            type: string
                                      required:
                                        - success
                                        - message
                                    - type: object
                                      properties:
                                        data:
                                            type: array
                                            items:
                                                type: object
                                                properties:
                                                    id:
                                                        type: integer
                                                    name:
                                                        type: string
                                                    created_at:
                                                        type: string
                                                        format: date-time
                                                    updated_at:
                                                        type: string
                                                        format: date-time
                                                required:
                                                    - id
                                                    - name
                                                    - created_at
                                                    - updated_at
    /courses/{courseID}/classes:
        post:
            tags:
                - participant
            security:
                - BearerAuth: []
            parameters:
                - in: path
                  name: courseID
                  schema:
                    type: integer
                  required: true
                  description: Numeric ID as the class(es)' parent course.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: array
                            items:
                                type: string
                                minLength: 1
                                maxLength: 1
            responses:
                '201':
                    description: Classes successfully created.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success:
                                        type: boolean
                                    message:
                                        type: string
                                required:
                                    - success
                                    - message
        get:
            tags:
                - participant
            security:
                - {}
            parameters:
                - in: path
                  name: courseID
                  schema:
                    type: integer
                  required: true
                  description: Numeric ID as the class(es)' parent course.
            responses:
                '200':
                    description: Classes successfully retrieved.
                    content:
                        application/json:
                            schema:
                                allOf:
                                    - type: object
                                      properties:
                                        success:
                                            type: boolean
                                        message:
                                            type: string
                                      required:
                                        - success
                                        - message
                                    - type: object
                                      properties:
                                        data:
                                            type: object
                                            properties:
                                                course:
                                                    type: object
                                                    properties:
                                                        id:
                                                            type: integer
                                                        name:
                                                            type: string
                                                        year:
                                                            type: integer
                                                    required:
                                                        - id
                                                        - name
                                                        - year
                                                classes:
                                                    type: array
                                                    items:
                                                        type: object
                                                        properties:
                                                            id:
                                                                type: integer
                                                            name:
                                                                type: string
                                                                minLength: 1
                                                                maxLength: 1
                                                            created_at:
                                                                type: string
                                                                format: date-time
                                                            updated_at:
                                                                type: string
                                                                format: date-time
                                                        required:
                                                            - id
                                                            - name
                                                            - created_at
                                                            - updated_at
    /classes/{classID}/teams:
        post:
            tags:
                - participant
            security:
                - BearerAuth: []
            parameters:
                - in: path
                  name: classID
                  schema:
                    type: integer
                  required: true
                  description: Numeric ID of the class to be related to.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                number_of_teams:
                                    type: integer
            responses:
                '201':
                    description: Classes successfully created.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success:
                                        type: boolean
                                    message:
                                        type: string
                                required:
                                    - success
                                    - message
        get:
            tags:
                - participant
            parameters:
                - in: path
                  name: classID
                  schema:
                    type: integer
                  required: true
                  description: Numeric ID as the team(s)' parent class.
            responses:
                '200':
                    description: Teams successfully retrieved.
                    content:
                        application/json:
                            schema:
                                allOf:
                                    - type: object
                                      properties:
                                        success:
                                            type: boolean
                                        message:
                                            type: string
                                      required:
                                        - success
                                        - message
                                    - type: object
                                      properties:
                                        data:
                                            type: array
                                            items:
                                                type: object
                                                properties:
                                                    id:
                                                        type: string
                                                        format: uuid
                                                    number:
                                                        type: integer
                                                    class:
                                                        type: object
                                                        properties:
                                                            id:
                                                                type: integer
                                                            name:
                                                                type: string
                                                                minLength: 1
                                                                maxLength: 1
                                                            course:
                                                                type: object
                                                                properties:
                                                                    id:
                                                                        type: integer
                                                                    name:
                                                                        type: string
                                                                    year:
                                                                        type: integer
                                                                required:
                                                                    - id
                                                                    - name
                                                                    - year
                                                        required:
                                                            - id
                                                            - name
                                                            - course
                                                    created_at:
                                                        type: string
                                                        format: date-time
                                                    updated_at:
                                                        type: string
                                                        format: date-time
                                                required:
                                                    - id
                                                    - number
                                                    - class
                                                    - created_at
                                                    - updated_at
