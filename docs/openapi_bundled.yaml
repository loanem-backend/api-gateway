openapi: 3.0.3
info:
    title: Loanem Back-End - OpenAPI 3.0
    description: |-
        This is a sample Loanem Back-End Server based on the OpenAPI 3.0 specification.
    version: 1.0.0
components:
    securitySchemes:
        BearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT
security:
    - BearerAuth: []
tags:
    - name: auth
      description: served by `auth-service`
paths:
    /login:
        post:
            tags:
                - auth
            security: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                phone:
                                    type: string
                                password:
                                    type: string
            responses:
                '201':
                    description: Successfully logged in.
                    content:
                        application/json:
                            schema:
                                allOf:
                                    - type: object
                                      properties:
                                        success:
                                            type: boolean
                                        message:
                                            type: string
                                      required:
                                        - success
                                        - message
                                    - type: object
                                      properties:
                                        data:
                                            type: object
                                            properties:
                                                token:
                                                    type: string
                                            required:
                                                - token
