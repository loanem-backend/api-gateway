post:
  tags: [auth]
  security: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            phone:
              type: string
            password:
              type: string
  responses:
    '201':
      description: Successfully logged in.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '../../components/schema/general.yaml#/SuccessResponse'
              - type: object
                properties:
                  data:
                    type: object
                    properties:
                      access_token:
                        type: string
                      refresh_token:
                        type: string
                     