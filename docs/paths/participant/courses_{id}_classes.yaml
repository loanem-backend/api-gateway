post:
  tags: [participant]
  security:
    - BearerAuth: []
  parameters:
    - $ref: ../../components/parameter/course.yaml#/CourseIDParam
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 1
  responses:
    '201':
      description: Classes successfully created.
      content:
        application/json:
          schema:
            $ref: ../../components/schema/general.yaml#/SuccessResponse

get:
  tags: [participant]
  parameters:
    - $ref: ../../components/parameter/course.yaml#/CourseIDParam
  responses:
    '200':
      description: Classes successfully retrieved.
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schema/general.yaml#/SuccessResponse
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: ../../components/schema/class.yaml#/ClassWithCourse
