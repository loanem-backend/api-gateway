post:
  tags: [course]
  security:
    - BearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            name:
              type: string
            year:
              type: integer
  responses:
    '201':
      description: Course successfully created.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '../../components/schema/general.yaml#/components/schemas/SuccessResponse'
              - type: object
                properties:
                  data:
                    $ref: '../../components/schema/general.yaml#/components/schemas/IdInt'
