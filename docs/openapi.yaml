openapi: 3.0.3
info:
  title: Loanem Back-End - OpenAPI 3.0
  description: |-
    This is a sample Loanem Back-End Server based on the OpenAPI 3.0 specification.
  version: 1.0.0

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - BearerAuth: []

tags:
  - name: auth
  - name: course
  - name: inventory
  - name: participant

paths:
  /login:
    $ref: './docs/paths/auth/login.yaml'
  /courses:
    $ref: './docs/paths/course/courses.yaml'
  /courses/{courseID}:
    $ref: './docs/paths/course/courses_{id}.yaml'
  /toolkits:
    $ref: './docs/paths/inventory/toolkits.yaml'
  /instruments:
    $ref: './docs/paths/inventory/instruments.yaml'
  /courses/{courseID}/classes:
    $ref: './docs/paths/participant/courses_{id}_classes.yaml'
  /classes/{classID}/teams:
    $ref: ./docs/paths/participant/classes_id_teams.yaml
